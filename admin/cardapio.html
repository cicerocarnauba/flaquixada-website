<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css">
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="./css/admin-global.css">
    <link rel="stylesheet" href="./css/cardapio.css">
    
    <title>Gerenciar Cardápio | Painel Fla-Quixadá</title>
</head>
<body>
    <admin-header></admin-header>

    <div class="admin-container">
        <admin-sidebar></admin-sidebar>

        <main class="admin-main admin-card">
            <div class="admin-main-header">
                <h2><i class="ri-restaurant-line"></i> Cardápio</h2>
                <button class="btn-primary" id="btn-novo-item"><i class="ri-add-line"></i> <span class="btn-text">Novo Item</span></button>
            </div>

            <div class="cardapio-list" id="admin-cardapio-list">
                <div class="admin-categoria">
                    <h3><i class="ri-goblet-line"></i> Bebidas</h3>
                    <ul id="admin-lista-bebidas" class="admin-lista-itens">
                        <li class="admin-item">
                            <div class="item-info">
                                <span class="item-nome">Brahma Chopp</span>
                                <span class="item-descricao">CERVEJA (600ml)</span>
                                <div class="item-precos">
                                    <span class="preco-socio">Sócio: R$ 10,00</span>
                                    <span class="preco-normal">Normal: R$ 12,00</span>
                                </div>
                            </div>
                            <div class="item-acoes">
                                <button class="btn-icon edit" title="Editar"><i class="ri-pencil-line"></i></button>
                                <button class="btn-icon delete" title="Excluir"><i class="ri-delete-bin-line"></i></button>
                            </div>
                        </li>
                    </ul>
                </div>

                <div class="admin-categoria">
                    <h3><i class="ri-bowl-line"></i> Petiscos</h3>
                    <ul id="admin-lista-petiscos" class="admin-lista-itens">
                        <li class="admin-item">
                            <div class="item-info">
                                <span class="item-nome">Batatinha</span>
                                <span class="item-descricao">PORÇÃO DE BATATA FRITA</span>
                                <div class="item-precos">
                                    <span class="preco-socio">Sócio: R$ 20,00</span>
                                    <span class="preco-normal">Normal: R$ 25,00</span>
                                </div>
                            </div>
                            <div class="item-acoes">
                                <button class="btn-icon edit" title="Editar"><i class="ri-pencil-line"></i></button>
                                <button class="btn-icon delete" title="Excluir"><i class="ri-delete-bin-line"></i></button>
                            </div>
                        </li>
                    </ul>
                </div>

                <div class="admin-categoria">
                    <h3><i class="ri-restaurant-2-line"></i> Pratos</h3>
                    <ul id="admin-lista-pratos" class="admin-lista-itens">
                        <li class="admin-item">
                            <div class="item-info">
                                <span class="item-nome">Feijoada</span>
                                <span class="item-descricao">PRATO COMPLETO (SERVE 2)</span>
                                <div class="item-precos">
                                    <span class="preco-socio">Sócio: R$ 35,00</span>
                                    <span class="preco-normal">Normal: R$ 45,00</span>
                                </div>
                            </div>
                            <div class="item-acoes">
                                <button class="btn-icon edit" title="Editar"><i class="ri-pencil-line"></i></button>
                                <button class="btn-icon delete" title="Excluir"><i class="ri-delete-bin-line"></i></button>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>

            <modal-cardapio></modal-cardapio>
            
        </main>
    </div>

    <script src="../js/utils/mockCardapio.js"></script>
    <script src="./js/components/AdminHeader.js" defer></script>
    <script src="./js/components/AdminSidebar.js" defer></script>
    <script src="./js/components/ModalCardapio.js" defer></script>
    <script src="./js/cardapio.js" defer></script>
</body>
</html>
